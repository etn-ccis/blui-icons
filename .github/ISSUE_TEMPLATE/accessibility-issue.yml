name: Accessibility Issue ♿
description: Report an accessibility or usability issue with a Brightlayer UI Icons package.
title: '[a11y]: '
labels: ['🐞 a11y:bug','status: needs-review', 'brightlayer-ui']
body:
  - type: markdown
    attributes:
      value: '## Welcome!'
  - type: markdown
    attributes:
      value:
        Thanks for taking the time to fill out this accessibility report. Brightlayer UI
        firmly believes that web and software experiences should be accessible
        for everyone. Brightlayer UI is committed to following and complying with
        accessibility best practices.
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package(s) are you using? You can select more than one.
      multiple: true
      options:
       - '@brightlayer-ui/icons'
       - '@brightlayer-ui/icons-svg'
       - '@brightlayer-ui/icons-mui'
       - '@brightlayer-ui/react-native-vector-icons'
       - '@brightlayer-ui/material-symbols'
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) are you experiencing the issue?
      multiple: true
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which operating system are you using?
      multiple: true
      options:
        - Windows
        - macOS
        - Other
  - type: input
    id: version
    attributes:
      label: Package version
      description: 'Which version(s) are you using?'
      placeholder: e.g. v10.42.0
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React / React Native version
      description: 'Which React or React Native version are you using?'
      placeholder: e.g. React 18.2.0, RN 0.74
  - type: input
    id: tool
    attributes:
      label: Automated testing tool and ruleset
      description: 'Which tool and ruleset uncovered the issue?'
      placeholder:
        e.g. Equal Access Accessibility Checker - Latest Deployment
    validations:
      required: false
 
  - type: textarea
    id: description
    attributes:
      label: Description
      description:
        "Tell us more about the accessibility issue that you're experiencing"
      placeholder: What did you expect to happen? What happened instead?
    validations:
      required: true
  - type: input
    id: wcag
    attributes:
      label: WCAG 2.1 Violation
      description: 'Does this violate a specific WCAG 2.1 checkpoint?'
      placeholder: e.g Success Criterion 1.4.3 Contrast (Minimum)
  - type: input
    id: example-url
    attributes:
      label: Reproduction/example
      description: |
        Provide a CodeSandbox, Stackblitz, or GitHub repository that demonstrates the accessibility issue.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description:
        'How do we reproduce the accessibility violation you described using the
        reproduction/example link above?'
    validations:
      required: true
