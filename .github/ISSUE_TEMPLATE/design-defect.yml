name: Design defect 🎨
description: Report a visual design issue for an icon or icon usage pattern.
title: '[Design Defect]: '
labels: ['🧩 design‑defect', 'status: needs-review', 'brightlayer-ui']
body:
    - type: markdown
      attributes:
          value: '## Welcome!'
    - type: markdown
      attributes:
          value: Thanks for taking the time to fill out the details below for this design
              defect.
    - type: dropdown
      id: package
      attributes:
          label: Package
          description: Which package(s) are you using?
          multiple: true
          options:
              - '@brightlayer-ui/icons'
              - '@brightlayer-ui/icons-svg'
              - '@brightlayer-ui/icons-mui'
              - '@brightlayer-ui/react-native-vector-icons'
              - '@brightlayer-ui/material-symbols'
      validations:
          required: true
    - type: dropdown
      id: browser
      attributes:
          label: Browser
          description: Which browser(s) are you experiencing the issue?
          multiple: true
          options:
              - Chrome
              - Safari
              - Firefox
              - Edge
    - type: input
      id: version
      attributes:
          label: Package version
          description: 'Which version(s) are you using?'
          placeholder: e.g. v10.42.0
      validations:
          required: true
    - type: textarea
      id: description
      attributes:
          label: Description
          description: "Tell us more about the problem that you're running into"
          placeholder: What did you see? What did you expect to see?
      validations:
          required: true
    - type: textarea
      id: example-url
      attributes:
          label: Screenshots
          description: 'Provide screenshots of the problem'
      validations:
          required: true
    - type: textarea
      id: reproduce
      attributes:
          label: Steps to reproduce
          description: 'How do we reproduce the problem displayed in the screenshots above?'
      validations:
          required: true


